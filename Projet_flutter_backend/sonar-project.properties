sonar.projectKey=crmprobar-backend
sonar.projectName=CRM ProBar Backend
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8

sonar.sources=src,server.js
sonar.tests=src
sonar.test.inclusions=src/**/*.test.js

sonar.exclusions=node_modules/**,coverage/**,uploads/**,src/migrations/**,src/seeders/**,src/scripts/**,scripts/**,src/uploads/**

# Generated by `npm test` (jest.config.js has collectCoverage/coverageDirectory set) —
# run tests before the scan so this file exists.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
